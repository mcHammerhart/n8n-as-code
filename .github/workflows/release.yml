name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      # Per-package outputs
      cli_release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      skills_release_created: ${{ steps.release.outputs['packages/skills--release_created'] }}
      transformer_release_created: ${{ steps.release.outputs['packages/transformer--release_created'] }}
      vscode_release_created: ${{ steps.release.outputs['packages/vscode-extension--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          scope: '@n8n-as-code'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Cache n8n repository
        uses: actions/cache@v4
        with:
          path: .n8n-cache
          key: ${{ runner.os }}-n8n-cache-${{ hashFiles('scripts/ensure-n8n-cache.cjs') }}
          restore-keys: |
            ${{ runner.os }}-n8n-cache-

      - name: Build all packages
        run: npm run build

      - name: Setup npm authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          echo "@n8n-as-code:registry=https://registry.npmjs.org/" >> ~/.npmrc

      # Publish in dependency order: transformer → skills → cli
      - name: Publish @n8n-as-code/transformer
        if: ${{ needs.release-please.outputs.transformer_release_created == 'true' }}
        run: cd packages/transformer && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @n8n-as-code/skills
        if: ${{ needs.release-please.outputs.skills_release_created == 'true' }}
        run: cd packages/skills && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @n8n-as-code/cli
        if: ${{ needs.release-please.outputs.cli_release_created == 'true' }}
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish VS Code Extension
        if: ${{ needs.release-please.outputs.vscode_release_created == 'true' }}
        run: |
          cd packages/vscode-extension
          npx @vscode/vsce package --no-dependencies
          npx @vscode/vsce publish --no-dependencies --pat ${{ secrets.VSCE_TOKEN }}
